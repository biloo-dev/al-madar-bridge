name: al_madar_bridge
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.11.5
dependencies:
  sentry_flutter: ^9.22.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.0
  provider: ^6.0.5
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1
  get: ^4.7.3
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  image_picker: ^1.1.2
  file_picker: ^8.1.3
  http: ^1.2.2
  url_launcher: ^6.3.1
  flutter_cached_pdfview: ^0.4.3
  path_provider: ^2.1.3
  convex_bottom_bar: ^3.2.0
  flutter_local_notifications: ^17.2.2
  #  intl: ^0.20.2
  #  flutter_sliding_tutorial: ^2.0.0+1
  intro_views_flutter: ^3.2.0
  carousel_slider: ^5.0.0
  cached_network_image: ^3.4.1

dev_dependencies:
  sentry_dart_plugin: ^3.4.0
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png" # You will need a PNG version for the launcher icon
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:

  uses-material-design: true

  assets:
    - assets/logo.svg
    - assets/logo.png
    - assets/background/
    - assets/userType/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: al-madar-bridge
